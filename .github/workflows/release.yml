# SECTION 09 — release pipeline. Triggered by pushing a `v*` tag (e.g. `v1.0.0`);
# builds installable artifacts for all four pieces and attaches them to a draft
# GitHub Release for manual review before publishing.
#
# [ACTION REQUIRED] before this can run for real:
#   1. Android signing — add these repo secrets and uncomment the signing step:
#        ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD,
#        ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD
#      (Section 14 Gotcha #6: unsigned release builds install but Play Store /
#      sideloading on TV will reject or warn on them.)
#   2. Windows code signing — desktop MSI/EXE builds are unsigned by default;
#      SmartScreen will warn users on first run. Add an Authenticode cert and
#      a signing step (e.g. via `signtool` on a windows-latest runner) once
#      you have one. Until then, tell users to click "More info → Run anyway".
#      (NOTE: Authenticode is about SmartScreen reputation — it is SEPARATE from
#      the Ed25519 update-integrity signing below, which the in-app updater
#      verifies and which IS already wired up.)
#   4. Update-integrity signing [REQUIRED for the auto-updater] — add the repo
#      secret UPDATE_SIGNING_KEY (the Ed25519 private key PEM) and embed the
#      matching public key in app-windows/.../update/UpdateSigning.kt. The
#      draft-release job signs the installer with it; the app refuses to install
#      any update whose signature doesn't verify. See UpdateSigning.kt for the
#      one-time `openssl genpkey` setup. Until the secret is set, this workflow
#      fails closed at the signing step rather than publish an unverifiable build.
#   3. Container registry — this workflow pushes the proxy image to GHCR using
#      the built-in GITHUB_TOKEN; no extra secret needed, but the package's
#      visibility defaults to private — set it to public in repo → Packages.
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version string for a manual run (e.g. 1.2.3) — only used for artifact naming"
        required: false
        default: "0.0.0-dev"

permissions:
  contents: write
  packages: write

jobs:
  windows:
    name: Windows desktop (installer)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Install VLC (bundled into the installer so users need nothing extra)
        # Pinned for reproducible installer builds + CVE tracking (3.0.21+ fixes
        # CVE-2024-46461, which affects VLC <= 3.0.20). Bump deliberately.
        run: choco install vlc --version=3.0.23 --yes --no-progress

      - name: Install Inno Setup (wraps the app with a launch-after-install step)
        run: choco install innosetup --yes --no-progress

      # bundleVlc and the app image must be SEPARATE Gradle invocations: in one
      # invocation, prepareAppResources reads the directory bundleVlc writes to,
      # which Gradle 8.10 rejects as an undeclared task dependency.
      - name: Bundle VLC into app resources
        run: .\gradlew.bat :app-windows:bundleVlc

      - name: Download libmpv (bundled for the opt-in mpv playback backend)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # x86-64-v3 libmpv dev build from shinchiro — the libmpv-2.dll the app loads.
          # GITHUB_TOKEN has read access to this public repo's releases.
          # NOTE: this pulls the LATEST shinchiro nightly (no --tag). That's deliberate:
          # shinchiro garbage-collects old nightlies, so a pinned tag would eventually
          # 404. The trade-off is non-reproducibility + the small risk that a new
          # nightly breaks the JNA bindings. Before mpv becomes the DEFAULT backend,
          # revisit this — e.g. vendor a validated libmpv-2.dll as a PureTV release
          # asset and download THAT by a fixed URL. (VLC is version-pinned via choco.)
          gh release download -R shinchiro/mpv-winbuild-cmake --pattern "mpv-dev-x86_64-v3-*.7z" --dir mpvdl --clobber
          $archive = Get-ChildItem mpvdl\*.7z | Select-Object -First 1
          if (-not $archive) { throw "No libmpv dev archive was downloaded." }
          7z x $archive.FullName -ompv-libs -y
          $dll = Get-ChildItem -Path mpv-libs -Recurse -Filter libmpv-2.dll | Select-Object -First 1
          if (-not $dll) { throw "libmpv-2.dll not found in the extracted archive." }
          echo "MPV_DIR=$($dll.Directory.FullName)" >> $env:GITHUB_ENV

      # Separate Gradle invocation from createReleaseDistributable (same
      # undeclared-input reason as bundleVlc). The Anime4K shader is committed
      # in-repo (app-windows/shaders/); only the libmpv DLL is downloaded above.
      - name: Bundle mpv into app resources
        run: .\gradlew.bat :app-windows:bundleMpv

      - name: Build release app image
        # SECURITY (audit P0-1): do NOT inject TWITCH_CLIENT_SECRET here. The
        # desktop app authenticates via the Device Code Grant (a PUBLIC client —
        # it sends no client_secret; see DeviceAuth). The secret is only used by
        # the Android/TV authorization_code flow (PkceAuth). Injecting it baked a
        # recoverable client_secret into the publicly-downloadable desktop jar
        # for zero functional benefit. The build falls back to the placeholder,
        # which desktop never uses. (If an Android/TV release job is added later,
        # inject the secret into THAT job only.)
        run: .\gradlew.bat :app-windows:createReleaseDistributable

      # --- Code signing (disabled until a cert exists) ---
      # Once a cert is set up, sign the .exe files inside the app image and the
      # final installer below with signtool before upload.

      - name: Build installer (Inno Setup, auto-launches after install)
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}" -replace '^v',''
          if (-not $ver) { $ver = "0.0.0" }
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$ver" "app-windows\installer\puretv.iss"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-release
          path: app-windows/build/installer/*.exe
          if-no-files-found: error

  proxy-image:
    name: Go proxy (Docker image -> GHCR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tag
        id: vars
        run: |
          REF_NAME="${{ github.ref_name }}"
          VERSION="${REF_NAME#v}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build & push image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: proxy-server
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/puretv-twitch-proxy:latest
            ghcr.io/${{ github.repository_owner }}/puretv-twitch-proxy:${{ steps.vars.outputs.version }}

  draft-release:
    name: Create draft GitHub Release
    # Only the Windows installer gates the release; Android is non-blocking and
    # the proxy image publishes itself to GHCR independently.
    needs: [windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Only the Windows installer artifact — downloading all artifacts also
      # pulls a stray Docker buildx metadata file that intermittently fails.
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: windows-release
          path: artifacts/windows-release

      - name: Resolve version (strip leading v from the tag)
        id: vars
        run: |
          REF_NAME="${{ github.ref_name }}"
          echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Maintainer pre-publish checklist goes to the Actions run summary, NOT the
      # release body — so it never reaches end users even if the draft is
      # published without edits. The `body` below is written to be safe to
      # publish as-is.
      - name: Pre-publish checklist (maintainer only — shown in the Actions run)
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ### Before publishing this draft
          - [ ] Windows installer runs end-to-end on a clean VM
          - [ ] `ghcr.io/${{ github.repository_owner }}/puretv-twitch-proxy:${{ github.ref_name }}` pulls and serves `/health`
          - [ ] Android APKs install + are signed (once signing is configured — see this file's header)
          - [ ] Eyeball the auto-generated "What's Changed" notes on the draft
          EOF

      # Detached Ed25519 signature so the in-app updater can verify the installer
      # before running it. The private key lives only in the UPDATE_SIGNING_KEY
      # secret; the matching public key is embedded in UpdateSigning.kt. The .sig
      # holds the base64 of the raw signature (UpdateSignatureVerifier reads it as
      # text). Fail-closed: a missing secret blocks the release.
      - name: Sign installer for update integrity (Ed25519)
        env:
          UPDATE_SIGNING_KEY: ${{ secrets.UPDATE_SIGNING_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${UPDATE_SIGNING_KEY:-}" ]; then
            echo "::error::UPDATE_SIGNING_KEY secret is not set. The in-app updater is fail-closed and rejects unsigned releases — refusing to publish. See app-windows/src/main/kotlin/com/puretv/twitch/desktop/update/UpdateSigning.kt for setup."
            exit 1
          fi
          installer="$(find artifacts/windows-release -name '*.exe' | head -n1)"
          if [ -z "$installer" ]; then echo "::error::No .exe installer found to sign."; exit 1; fi
          printf '%s\n' "$UPDATE_SIGNING_KEY" > signing_key.pem
          openssl pkeyutl -sign -inkey signing_key.pem -rawin -in "$installer" -out installer.sig.raw
          base64 -w0 installer.sig.raw > "${installer}.sig"
          rm -f signing_key.pem installer.sig.raw
          echo "Signed $(basename "$installer") -> $(basename "${installer}").sig"

      # Turn the top CHANGELOG.md section into the user-facing release notes —
      # plain language, no auto-generated technical commit list.
      - name: Build release notes from CHANGELOG
        run: |
          VER="${GITHUB_REF_NAME#v}"
          # Everything after "## <ver>" up to the next "## "; drop leading blank
          # lines so the first line is the friendly summary the in-app banner shows.
          awk -v ver="## $VER" '
            index($0, ver) == 1 { f=1; next }
            f && index($0, "## ") == 1 { exit }
            f { print }
          ' CHANGELOG.md | sed '/./,$!d' > notes.md
          if [ ! -s notes.md ]; then
            printf 'This release updates PureTV for Twitch.\n' > notes.md
          fi
          cat >> notes.md <<'DL'

          ---
          **Download** the installer below and run it. Everything's included, no separate VLC needed. If Windows shows a SmartScreen warning, click **More info, then Run anyway**. Already have PureTV? Just install over it.
          DL
          echo "----- release notes -----"; cat notes.md

      - name: Create draft release with artifacts
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          draft: true
          generate_release_notes: false
          body_path: notes.md
          files: |
            artifacts/windows-release/**/*.exe
            artifacts/windows-release/**/*.exe.sig
