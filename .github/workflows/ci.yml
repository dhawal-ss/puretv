# SECTION 09 — continuous integration. Runs on every push/PR; mirrors the
# four independently-buildable pieces of the monorepo (Section 12.1: "core is
# the only thing shared — the three apps and the proxy never depend on each
# other"), so a break in one never blocks or hides a break in another.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Kotlin/Gradle: core + the three platform apps -------------------------
  gradle-build:
    name: Gradle (core + desktop)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      # app-android is built below. The build break that kept it out of CI (a
      # Kotlin/KSP JVM-target mismatch, javac=11 vs Kotlin=17) is fixed via
      # kotlinOptions jvmTarget=11 in app-android/build.gradle.kts. app-tv
      # (Android TV) stays excluded until that app's revival resumes.

      - name: Unit tests (core commonTest + desktop unit tests)
        run: ./gradlew :core:allTests :app-windows:test

      - name: Build Android phone app (debug APK)
        run: ./gradlew :app-android:assembleDebug

      - name: Package Windows desktop distributable (current OS image only — full MSI/EXE requires windows-latest, see release.yml)
        run: ./gradlew :app-windows:createDistributable

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gradle-test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 7

  # ---- Go: self-hosted ad-block proxy -----------------------------------------
  go-proxy:
    name: Go proxy server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: proxy-server
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.23.12"
          # NOTE: no `cache-dependency-path` — this server is pure stdlib
          # (see go.mod), so there's no go.sum to key the cache on.

      - name: Vet
        run: go vet ./...

      - name: Test (with race detector + coverage)
        run: go test -race -coverprofile=coverage.out ./...

      - name: Build
        run: go build -o /tmp/proxy-server .

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: go-proxy-coverage
          path: proxy-server/coverage.out
          retention-days: 7
